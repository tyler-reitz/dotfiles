backend = "xrender";
vsync = true;

corner-radius = 0;
rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "window_type = 'dock'"
];

shadow = true;
shadow-radius = 22;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.22;
shadow-exclude = [
  "class_g = 'Polybar'",
  "window_type = 'dock'"
];

fading = true;
fade-in-step = 0.04;
fade-out-step = 0.05;

inactive-opacity = 0.96;
active-opacity = 1.0;
frame-opacity = 0.95;
inactive-opacity-override = false;

blur-method = "kernel";
blur-strength = 4;
blur-background = false;

detect-client-opacity = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-damage = true;
