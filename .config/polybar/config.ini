[global/wm]
include-file = /home/me/.cache/wal/colors-polybar.ini

[colors]
background = ${color.background}
background-alt = ${color.background-alt}
foreground = ${color.foreground}
primary = ${color.primary}
secondary = ${color.secondary}
alert = ${color.alert}
disabled = ${color.disabled}

[bar/main]
width = 98.5%
height = 30
radius = 0
bottom = true
offset-x = 0.75%
offset-y = 8

dpi = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3
border-size = 0

padding-left = 2
padding-right = 2

module-margin = 1

separator = "  "
separator-foreground = ${colors.disabled}

font-0 = Noto Sans Mono:size=10;2

modules-left = xworkspaces
modules-center = date
modules-right = pulseaudio cpu memory wlan eth battery filesystem

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = generic

override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = [ %name% ]
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /

label-mounted = disk %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume>
label-volume = vol %percentage%%
label-muted = vol mute
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
label = mem %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
label = cpu %percentage%%

[module/wlan]
type = internal/network
interface-type = wireless
interval = 3

format-connected = <label-connected>
label-connected = wifi %essid% %signal%%

format-disconnected = <label-disconnected>
label-disconnected = wifi down
label-disconnected-foreground = ${colors.disabled}

[module/eth]
type = internal/network
interface-type = wired
interval = 3

label-connected = eth %local_ip%

label-disconnected = eth down
label-disconnected-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1

date = %a %b %d
time = %H:%M

label = %date%  %time%

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ACAD
poll-interval = 5

label-charging = bat %percentage%%+
label-discharging = bat %percentage%%
label-full = bat %percentage%%
label-low = bat %percentage%%
label-low-foreground = ${colors.alert}
